<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 360" role="img" aria-label="Claude Context Pill preview">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0e1016"/>
      <stop offset="100%" stop-color="#06080d"/>
    </linearGradient>
    <radialGradient id="glow-ok" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#6ee7b7" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#6ee7b7" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow-warn" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fbbf24" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#fbbf24" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow-danger" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#f87171" stop-opacity="0.75"/>
      <stop offset="100%" stop-color="#f87171" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="24" height="24" patternUnits="userSpaceOnUse">
      <path d="M 24 0 L 0 0 0 24" fill="none" stroke="rgba(255,255,255,0.025)" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="720" height="360" fill="url(#bg)"/>
  <rect width="720" height="360" fill="url(#grid)"/>

  <!-- header -->
  <text x="40" y="48" fill="#e8ecf4" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="11" letter-spacing="3.5">CLAUDE CONTEXT PILL</text>
  <text x="40" y="64" fill="rgba(232,236,244,0.45)" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="10">three status states, color shifts at 60% and 85% of the 1M token budget</text>

  <!-- OK pill -->
  <g transform="translate(40, 110)">
    <circle cx="20" cy="20" r="30" fill="url(#glow-ok)"/>
    <g>
      <rect x="0" y="2" width="190" height="36" rx="18" ry="18"
        fill="rgba(14,16,22,0.78)" stroke="rgba(255,255,255,0.08)"/>
      <circle cx="20" cy="20" r="4.5" fill="#6ee7b7"/>
      <text x="36" y="24" fill="rgba(232,236,244,0.94)" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="13" font-weight="500">~248k / 1M</text>
      <line x1="124" y1="11" x2="124" y2="29" stroke="rgba(255,255,255,0.08)"/>
      <text x="132" y="23" fill="rgba(232,236,244,0.55)" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="11.5">24.8%</text>
    </g>
    <text x="210" y="25" fill="rgba(232,236,244,0.6)" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="11">ok &lt; 60%</text>
  </g>

  <!-- WARN pill -->
  <g transform="translate(40, 180)">
    <circle cx="20" cy="20" r="34" fill="url(#glow-warn)"/>
    <g>
      <rect x="0" y="2" width="190" height="36" rx="18" ry="18"
        fill="rgba(14,16,22,0.82)" stroke="rgba(251,191,36,0.22)"/>
      <circle cx="20" cy="20" r="4.5" fill="#fbbf24"/>
      <text x="36" y="24" fill="rgba(232,236,244,0.94)" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="13" font-weight="500">~712k / 1M</text>
      <line x1="124" y1="11" x2="124" y2="29" stroke="rgba(255,255,255,0.08)"/>
      <text x="132" y="23" fill="rgba(232,236,244,0.55)" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="11.5">71.2%</text>
    </g>
    <text x="210" y="25" fill="rgba(232,236,244,0.6)" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="11">warn 60 to 85%</text>
  </g>

  <!-- DANGER pill -->
  <g transform="translate(40, 250)">
    <circle cx="20" cy="20" r="38" fill="url(#glow-danger)"/>
    <g>
      <rect x="0" y="2" width="190" height="36" rx="18" ry="18"
        fill="rgba(14,16,22,0.85)" stroke="rgba(248,113,113,0.35)"/>
      <circle cx="20" cy="20" r="4.5" fill="#f87171"/>
      <text x="36" y="24" fill="rgba(254,226,226,0.96)" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="13" font-weight="500">~924k / 1M</text>
      <line x1="124" y1="11" x2="124" y2="29" stroke="rgba(255,255,255,0.08)"/>
      <text x="132" y="23" fill="rgba(232,236,244,0.55)" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="11.5">92.4%</text>
    </g>
    <text x="210" y="25" fill="rgba(232,236,244,0.6)" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="11">danger &gt; 85%</text>
  </g>

  <!-- right column: composer mock -->
  <g transform="translate(420, 110)">
    <rect x="0" y="0" width="260" height="180" rx="14" ry="14" fill="rgba(255,255,255,0.02)" stroke="rgba(255,255,255,0.06)"/>
    <text x="16" y="26" fill="rgba(232,236,244,0.4)" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="10" letter-spacing="2">CLAUDE.AI COMPOSER</text>
    <rect x="16" y="40" width="228" height="86" rx="10" ry="10" fill="rgba(0,0,0,0.35)" stroke="rgba(255,255,255,0.06)"/>
    <text x="28" y="64" fill="rgba(232,236,244,0.32)" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="11">how do i...</text>
    <!-- floating pill in corner -->
    <g transform="translate(58, 134)">
      <circle cx="14" cy="14" r="22" fill="url(#glow-ok)"/>
      <rect x="0" y="0" width="148" height="28" rx="14" ry="14"
        fill="rgba(14,16,22,0.92)" stroke="rgba(255,255,255,0.1)"/>
      <circle cx="14" cy="14" r="3.5" fill="#6ee7b7"/>
      <text x="26" y="18" fill="rgba(232,236,244,0.94)" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="10.5" font-weight="500">~248k / 1M</text>
      <line x1="96" y1="7" x2="96" y2="21" stroke="rgba(255,255,255,0.08)"/>
      <text x="102" y="17" fill="rgba(232,236,244,0.55)" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="9.5">24.8%</text>
    </g>
  </g>

  <!-- footer -->
  <text x="40" y="332" fill="rgba(232,236,244,0.32)" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="9.5" letter-spacing="1.5">CLIENT-SIDE  /  NO NETWORK CALLS  /  MANIFEST V3  /  ZERO DEPENDENCIES</text>
</svg>
