name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  validate:
    name: validate extension
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: install ci deps (no scripts)
        run: npm ci --ignore-scripts

      - name: lint manifest, files, and permissions
        run: npm run lint

      - name: verify version sync
        run: npm run verify

      - name: rebuild tokenizer bundle and verify reproducibility
        run: |
          cp vendor/tokenizer.bundle.js /tmp/committed-bundle.js
          npm run bundle:tokenizer
          # Bundle should rebuild successfully. Size variance is fine
          # across esbuild versions, so we compare existence not bytes.
          test -f vendor/tokenizer.bundle.js

      - name: package zip artifact
        run: npm run package

      - name: upload zip artifact
        uses: actions/upload-artifact@v4
        with:
          name: claude-context-pill-${{ github.sha }}
          path: dist/*.zip
          retention-days: 14
